<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>今日料理决策器</title>
    <style>
        :root {
            --main-bg: #fff5f5;
            --accent: #ff6b6b;
            --accent-green: #51cf66;
            --card-bg: white;
            --border: #e9ecef;
            --text: #333;
            --muted: #666;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--main-bg);
            color: var(--text);
            max-width: 780px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 24px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .hero-title {
            text-align: center;
            color: var(--accent);
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 14px 0;
        }

        .section-title {
            margin: 0 0 12px 0;
        }

        .category {
            margin: 10px 0;
            font-weight: bold;
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            background: #eee;
            padding: 7px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.25s;
            font-size: 14px;
            user-select: none;
        }

        .tag.active {
            background: var(--accent);
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.92; }
        .green-btn { background: var(--accent-green); }
        .secondary-btn { background: #495057; }
        .danger-btn { background: #e03131; }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        #result {
            background: #fff3bf;
            border-left: 5px solid #fab005;
        }

        details {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            overflow: hidden;
        }

        summary {
            list-style: none;
            cursor: pointer;
            padding: 18px 20px;
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        summary::-webkit-details-marker { display: none; }

        .details-content {
            padding: 0 20px 20px 20px;
        }

        .summary-arrow {
            font-size: 18px;
            transition: transform 0.2s ease;
        }

        details[open] .summary-arrow { transform: rotate(180deg); }

        .recipe-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            background: #fffdfd;
        }

        .recipe-item h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
        }

        .recipe-meta {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .inline-label {
            font-size: 13px;
            color: var(--muted);
            margin: 8px 0 4px;
            font-weight: bold;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .editor-actions button {
            width: auto;
            flex: 1;
            font-size: 14px;
            padding: 10px;
        }

        .empty-state {
            color: var(--muted);
            text-align: center;
            padding: 16px 0;
        }

        .small-text {
            font-size: 14px;
            color: var(--muted);
        }

        .mode-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 10px;
        }

        .mode-btn {
            width: auto;
            min-width: 140px;
            padding: 12px 16px;
            border-radius: 999px;
            background: #f1f3f5;
            color: #333;
            border: 2px solid transparent;
            font-weight: 700;
        }

        .mode-btn.active {
            background: #ffe3e3;
            border-color: var(--accent);
            color: var(--accent);
        }

        .mode-brief {
            text-align: center;
            color: var(--muted);
            margin-bottom: 14px;
            min-height: 20px;
        }

        .custom-panel {
            display: none;
            margin-top: 12px;
            padding: 14px;
            border: 1px dashed #ffc9c9;
            background: #fffafa;
            border-radius: 12px;
        }

        .custom-panel.show { display: block; }

        .result-block {
            line-height: 1.8;
        }

        .result-block ul {
            margin-top: 8px;
            padding-left: 22px;
        }

        .pill {
            display: inline-block;
            background: #fff0f0;
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <h1>🍱 每日菜单决策器</h1>

    <div class="card">
        <h2 class="hero-title">🎲 今天吃什么？</h2>
        <p style="text-align:center;">今天是：<span id="todayDate"></span></p>

        <div class="mode-row">
            <button class="mode-btn active" type="button" onclick="selectMode('daily')">日常模式</button>
            <button class="mode-btn" type="button" onclick="selectMode('big')">搞个大菜</button>
            <button class="mode-btn" type="button" onclick="selectMode('custom')">自定义</button>
        </div>

        <div id="modeBrief" class="mode-brief">3个快手菜</div>

        <div id="customPanel" class="custom-panel">
            <div class="inline-label">一共打算做几道菜</div>
            <input type="number" id="customTotal" min="1" max="8" value="3">

            <div class="inline-label">其中做几个大菜</div>
            <input type="number" id="customBig" min="0" max="8" value="1">

            <div class="inline-label">今天特别想吃什么（可留空）</div>
            <input type="text" id="customWish" placeholder="例如：番茄、鯖、咖喱、想吃热乎的">
        </div>

        <button class="green-btn" onclick="decideMenu()">🌟 开启今日盲盒 🌟</button>
        <div id="result" style="display:none; margin-top:15px; padding:15px; border-radius:10px;"></div>
    </div>

    <details>
        <summary>
            <span>📝 录入新菜谱</span>
            <span class="summary-arrow">▼</span>
        </summary>
        <div class="details-content">
            <input type="text" id="recipeName" placeholder="菜名，例如：番茄炒蛋">

            <div class="category">【肉类】</div>
            <div id="meatTags" class="tag-group">
                <span class="tag" onclick="toggleTag(this)">牛肉</span>
                <span class="tag" onclick="toggleTag(this)">猪肉</span>
                <span class="tag" onclick="toggleTag(this)">鸡肉</span>
                <span class="tag" onclick="toggleTag(this)">肉末</span>
            </div>

            <div class="category">【海鲜】</div>
            <div id="seafoodTags" class="tag-group">
                <span class="tag" onclick="toggleTag(this)">虾</span>
                <span class="tag" onclick="toggleTag(this)">鲑鱼</span>
                <span class="tag" onclick="toggleTag(this)">蛤蜊</span>
                <span class="tag" onclick="toggleTag(this)">牡蛎</span>
                <span class="tag" onclick="toggleTag(this)">鲭鱼</span>
                <span class="tag" onclick="toggleTag(this)">鰤鱼</span>
                <span class="tag" onclick="toggleTag(this)">海带</span>
            </div>

            <div class="category">【绿叶蔬菜】</div>
            <div id="leafyVegTags" class="tag-group">
                <span class="tag" onclick="toggleTag(this)">白菜</span>
                <span class="tag" onclick="toggleTag(this)">青梗菜</span>
                <span class="tag" onclick="toggleTag(this)">卷心菜</span>
                <span class="tag" onclick="toggleTag(this)">小松菜</span>
                <span class="tag" onclick="toggleTag(this)">韭菜</span>
                <span class="tag" onclick="toggleTag(this)">蒜苗</span>
                <span class="tag" onclick="toggleTag(this)">菠菜</span>
                <span class="tag" onclick="toggleTag(this)">芹菜</span>
                <span class="tag" onclick="toggleTag(this)">豆芽</span>
            </div>

            <div class="category">【其他蔬菜】</div>
            <div id="otherVegTags" class="tag-group">
                <span class="tag" onclick="toggleTag(this)">洋葱</span>
                <span class="tag" onclick="toggleTag(this)">土豆</span>
                <span class="tag" onclick="toggleTag(this)">青椒</span>
                <span class="tag" onclick="toggleTag(this)">黄瓜</span>
                <span class="tag" onclick="toggleTag(this)">番茄</span>
                <span class="tag" onclick="toggleTag(this)">茄子</span>
                <span class="tag" onclick="toggleTag(this)">蘑菇</span>
                <span class="tag" onclick="toggleTag(this)">南瓜</span>
                <span class="tag" onclick="toggleTag(this)">莲藕</span>
                <span class="tag" onclick="toggleTag(this)">胡萝卜</span>
                <span class="tag" onclick="toggleTag(this)">笋</span>
            </div>

            <div class="category">【其他】</div>
            <div id="otherTags" class="tag-group">
                <span class="tag" onclick="toggleTag(this)">鸡蛋</span>
                <span class="tag" onclick="toggleTag(this)">豆腐</span>
                <span class="tag" onclick="toggleTag(this)">粉丝</span>
            </div>

            <div class="category">【耗时】</div>
            <div id="timeTags" class="tag-group">
                <span class="tag active" onclick="selectOne(this)">快手菜</span>
                <span class="tag" onclick="selectOne(this)">大菜</span>
            </div>

            <button onclick="saveRecipe()">保存并让 AI 分析录入 ✨</button>
        </div>
    </details>

    <details>
        <summary>
            <span>📚 查看编辑现有菜谱</span>
            <span class="summary-arrow">▼</span>
        </summary>
        <div class="details-content">
            <div id="recipeList"></div>
        </div>
    </details>

    <script>
        const API_KEY = "sk-998f5cd052f243f7a609f808b2e3173e";
        const STORAGE_KEY = 'my_recipes';
        const PROTEIN_INGREDIENTS = ['牛肉','猪肉','鸡肉','肉末','虾','鲑鱼','蛤蜊','牡蛎','鲭鱼','鰤鱼','鸡蛋','豆腐'];
        const VEGETABLE_INGREDIENTS = ['白菜','青梗菜','卷心菜','小松菜','韭菜','蒜苗','菠菜','芹菜','豆芽','洋葱','土豆','青椒','黄瓜','番茄','茄子','蘑菇','南瓜','莲藕','胡萝卜','笋'];
        let recipes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let selectedMode = 'daily';

        document.getElementById('todayDate').innerText = new Date().toLocaleDateString();
        renderRecipeList();

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
        }

        function toggleTag(el) {
            el.classList.toggle('active');
        }

        function selectOne(el) {
            el.parentElement.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function selectMode(mode) {
            selectedMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            const buttons = document.querySelectorAll('.mode-btn');
            if (mode === 'daily') buttons[0].classList.add('active');
            if (mode === 'big') buttons[1].classList.add('active');
            if (mode === 'custom') buttons[2].classList.add('active');

            const brief = document.getElementById('modeBrief');
            const panel = document.getElementById('customPanel');

            if (mode === 'daily') {
                brief.innerText = '3个快手菜';
                panel.classList.remove('show');
            } else if (mode === 'big') {
                brief.innerText = '2个快手菜 + 1个大菜';
                panel.classList.remove('show');
            } else {
                brief.innerText = '自己决定总菜数、大菜数和想吃的内容';
                panel.classList.add('show');
            }
        }

        async function saveRecipe() {
            const name = document.getElementById('recipeName').value.trim();
            if (!name) return alert('写个菜名嘛~');

            const selectedTags = Array.from(document.querySelectorAll('#meatTags .tag.active, #seafoodTags .tag.active, #leafyVegTags .tag.active, #otherVegTags .tag.active, #otherTags .tag.active, #timeTags .tag.active')).map(t => t.innerText);
            const timeType = selectedTags.find(t => t === '快手菜' || t === '大菜') || '快手菜';
            const ingredients = selectedTags.filter(t => t !== '快手菜' && t !== '大菜');

            if (ingredients.length === 0) return alert('至少选一些食材吧~');

            alert('正在召唤 DeepSeek 分析录入...');
            const shun = await getShunFromAI(ingredients);

            const newRecipe = {
                id: Date.now(),
                name,
                ingredients,
                timeType,
                shun,
                date: new Date().toISOString()
            };

            recipes.push(newRecipe);
            saveToStorage();
            renderRecipeList();

            alert(`成功！"${name}" 已存入本地缓存。旬：${shun}月`);
            document.getElementById('recipeName').value = '';
            document.querySelectorAll('#meatTags .tag.active, #seafoodTags .tag.active, #leafyVegTags .tag.active, #otherVegTags .tag.active, #otherTags .tag.active').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#timeTags .tag').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#timeTags .tag')[0].classList.add('active');
        }

        async function getShunFromAI(ing) {
            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [{
                            role: 'user',
                            content: `分析食材 ${ing.join(',')}。只输出它们在日本最适合食用的数字月份（如3,4,5），不要解释。`
                        }]
                    })
                });
                const data = await response.json();
                return data?.choices?.[0]?.message?.content?.trim() || '1-12';
            } catch (e) {
                return '1-12';
            }
        }

        function getModeConfig() {
            if (selectedMode === 'daily') {
                return { total: 3, bigCount: 0, wish: '' };
            }
            if (selectedMode === 'big') {
                return { total: 3, bigCount: 1, wish: '' };
            }

            const total = Number(document.getElementById('customTotal').value || 0);
            const bigCount = Number(document.getElementById('customBig').value || 0);
            const wish = document.getElementById('customWish').value.trim();
            return { total, bigCount, wish };
        }

        async function decideMenu() {
            if (recipes.length < 2) return alert('库里菜太少了，多存几道吧！QAQ');

            const { total, bigCount, wish } = getModeConfig();
            if (!Number.isInteger(total) || total <= 0) return alert('总菜数要填正确');
            if (!Number.isInteger(bigCount) || bigCount < 0) return alert('大菜数要填正确');
            if (bigCount > total) return alert('大菜数不能大于总菜数');
            if (recipes.length < total) return alert(`当前只有 ${recipes.length} 道菜，暂时凑不出 ${total} 道哦`);

            const currentDate = new Date();
            const currentMonth = currentDate.getMonth() + 1;
            const weekday = ['周日','周一','周二','周三','周四','周五','周六'][currentDate.getDay()];
            const quickRecipes = recipes.filter(r => r.timeType === '快手菜');
            const bigRecipes = recipes.filter(r => r.timeType === '大菜');

            if (bigCount > bigRecipes.length) return alert(`大菜库存不够，目前只有 ${bigRecipes.length} 道大菜`);
            if ((total - bigCount) > quickRecipes.length) return alert(`快手菜库存不够，目前只有 ${quickRecipes.length} 道快手菜`);

            const candidatePool = recipes.map(r => ({
                name: r.name,
                ingredients: r.ingredients || [],
                timeType: r.timeType || '快手菜',
                shun: r.shun || '',
                isInSeason: isMonthInShun(currentMonth, r.shun || ''),
            }));

            const resDiv = document.getElementById('result');
            resDiv.style.display = 'block';
            resDiv.innerHTML = 'DeepSeek 正在给你配今日菜单...';

            const fallbackMenu = buildFallbackMenu(total, bigCount, wish, currentMonth, weekday);

            try {
                const aiResult = await getMenuFromAI({
                    currentMonth,
                    weekday,
                    total,
                    bigCount,
                    wish,
                    candidatePool,
                    fallbackMenu
                });

                renderMenuResult(aiResult, { total, bigCount, wish, currentMonth });
            } catch (e) {
                renderFallbackResult(fallbackMenu, { total, bigCount, wish, currentMonth });
            }
        }

        function buildFallbackMenu(total, bigCount, wish, currentMonth, weekday) {
            const scored = [...recipes].map(r => {
                let score = 0;
                if (isMonthInShun(currentMonth, r.shun || '')) score += 50;
                if (wish && matchesWish(r, wish)) score += 30;
                if ((r.ingredients || []).some(isVegetable)) score += 8;
                if ((r.ingredients || []).some(isProtein)) score += 8;
                score += Math.random() * 10;
                return { ...r, score };
            }).sort((a, b) => b.score - a.score);

            const bigs = scored.filter(r => r.timeType === '大菜').slice(0, bigCount);
            const selectedIds = new Set(bigs.map(r => r.id));
            const quicks = scored.filter(r => r.timeType === '快手菜' && !selectedIds.has(r.id)).slice(0, total - bigCount);
            const finalMenu = [...bigs, ...quicks];
            const dishes = finalMenu.map(r => ({
                name: r.name,
                timeType: r.timeType,
                ingredients: r.ingredients,
                reason: buildReason(r, wish, currentMonth)
            }));

            return {
                dishes,
                comment: generateDynamicFallbackComment(dishes, { total, bigCount, wish, currentMonth, weekday })
            };
        }

        async function getMenuFromAI(payload) {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        {
                            role: 'system',
                            content: '你是一个会配家庭菜单的中文料理助手。你必须严格从用户给出的候选菜谱中选菜，不能编造不存在的菜名。优先旬食材，其次考虑荤素搭配、做菜负担、用户想吃的内容。只输出合法JSON对象，不要markdown，不要代码块，不要解释。comment字段必须根据所选菜单内容写一句新的、风趣幽默的中文短评，不能使用固定句子。'
                        },
                        {
                            role: 'user',
                            content: JSON.stringify({
                                task: '从候选菜谱中选出今日菜单',
                                requiredJsonShape: {
                                    dishes: [
                                        { name: '菜名', timeType: '快手菜或大菜', ingredients: ['食材1','食材2'], reason: '为什么入选' }
                                    ],
                                    comment: '一句根据菜单内容生成的幽默短评'
                                },
                                rules: {
                                    mustSelectExactly: payload.total,
                                    bigDishCount: payload.bigCount,
                                    preferInSeason: true,
                                    preferBalancedProteinAndVegetable: true,
                                    considerWish: payload.wish || '',
                                    outputLanguage: 'zh-CN'
                                },
                                dateInfo: {
                                    month: payload.currentMonth,
                                    weekday: payload.weekday
                                },
                                candidates: payload.candidatePool,
                                fallbackReference: payload.fallbackMenu
                            })
                        }
                    ],
                    temperature: 1.0
                })
            });

            const data = await response.json();
            const raw = data?.choices?.[0]?.message?.content?.trim();
            const parsed = safeParseJSON(raw);
            if (!parsed || !Array.isArray(parsed.dishes)) throw new Error('AI返回格式异常');
            return parsed;
        }

        function renderMenuResult(aiResult, config) {
            const resDiv = document.getElementById('result');
            const dishes = aiResult.dishes || [];
            const comment = aiResult.comment || '今天这顿饭，主打一个吃完还能夸自己会过日子。';

            let html = `<div class="result-block">`;
            html += `<div><span class="pill">${config.currentMonth}月优先</span><span class="pill">${config.bigCount}个大菜</span><span class="pill">共${config.total}道</span></div>`;
            html += `<h4>🎉 今日菜单</h4><ul>`;

            dishes.forEach(d => {
                const ing = Array.isArray(d.ingredients) ? d.ingredients.join('、') : '';
                html += `<li><b>${escapeHtml(d.name || '')}</b>（${escapeHtml(d.timeType || '')}）`;
                if (ing) html += ` - 食材：${escapeHtml(ing)}`;
                if (d.reason) html += `<br><span class="small-text">→ ${escapeHtml(d.reason)}</span>`;
                html += `</li>`;
            });

            html += `</ul>`;
            if (config.wish) {
                html += `<p><b>你今天想吃：</b>${escapeHtml(config.wish)}</p>`;
            }
            html += `<p><b>锐评：</b>${escapeHtml(comment)}</p>`;
            html += `</div>`;
            resDiv.innerHTML = html;
        }

        function renderFallbackResult(fallbackMenu, config) {
            renderMenuResult(fallbackMenu, config);
        }

        function isMonthInShun(month, shunText) {
            if (!shunText) return false;
            const nums = (String(shunText).match(/\d+/g) || []).map(Number);
            return nums.includes(month);
        }

        function matchesWish(recipe, wish) {
            const text = `${recipe.name} ${(recipe.ingredients || []).join(' ')}`.toLowerCase();
            return String(wish).toLowerCase().split(/[\s,，、]+/).filter(Boolean).some(word => text.includes(word));
        }

        function isVegetable(name) {
            return VEGETABLE_INGREDIENTS.includes(name);
        }

        function isProtein(name) {
            return PROTEIN_INGREDIENTS.includes(name);
        }

        function buildReason(recipe, wish, currentMonth) {
            const reasons = [];
            if (isMonthInShun(currentMonth, recipe.shun || '')) reasons.push('现在吃正当季');
            if (wish && matchesWish(recipe, wish)) reasons.push('贴合你今天想吃的口味');
            if ((recipe.ingredients || []).some(isVegetable)) reasons.push('能补一点蔬菜位');
            if ((recipe.ingredients || []).some(isProtein)) reasons.push('蛋白质担当到位');
            return reasons.slice(0, 2).join('，') || '今天抽到它，是命运和冰箱共同的决定';
        }

        function generateDynamicFallbackComment(dishes, config) {
            const names = dishes.map(d => d.name).filter(Boolean);
            const hasBig = dishes.some(d => d.timeType === '大菜');
            const vegCount = dishes.filter(d => (d.ingredients || []).some(isVegetable)).length;
            const proteinCount = dishes.filter(d => (d.ingredients || []).some(isProtein)).length;
            const inSeasonCount = dishes.filter(d => (d.reason || '').includes('正当季')).length;
            const wishText = config.wish ? `而且还照顾了你想吃“${config.wish}”这点小私心，` : '';

            const pool = [
                `今天这桌是${hasBig ? '“主菜撑场”' : '“快手高效”'}路线，${wishText}像是把下班后的体面和胃口一起保住了。`,
                `这套搭配里蔬菜位 ${vegCount} 个、蛋白质位 ${proteinCount} 个，属于冰箱管理学里的优等生。`,
                `${names.slice(0, 2).join('、')}${names.length > 2 ? '再加上' + names[2] : ''}，这不是随便吃吃，这是今晚在厨房里开了个小型胜利发布会。`,
                `${inSeasonCount > 0 ? '连当季食材都押中了，' : ''}今天这份菜单的气质，大概就是“花最合理的力气，吃最像样的一顿”。`,
                `${config.weekday}做这套菜，说明你对生活的要求是：不能太累，但也不能随便。`
            ];

            return pool[Math.floor(Math.random() * pool.length)];
        }

        function safeParseJSON(text) {
            if (!text) return null;
            try { return JSON.parse(text); } catch (e) {}
            const match = text.match(/\{[\s\S]*\}/);
            if (!match) return null;
            try { return JSON.parse(match[0]); } catch (e) { return null; }
        }

        function renderRecipeList() {
            const recipeList = document.getElementById('recipeList');
            if (!recipes.length) {
                recipeList.innerHTML = `<div class="empty-state">目前还没有菜谱，先去录入几道吧。</div>`;
                return;
            }

            recipeList.innerHTML = recipes.map(recipe => `
                <div class="recipe-item">
                    <h4>${escapeHtml(recipe.name)}</h4>
                    <div class="recipe-meta">
                        <div><b>食材：</b>${escapeHtml((recipe.ingredients || []).join('、'))}</div>
                        <div><b>耗时：</b>${escapeHtml(recipe.timeType || '')}</div>
                        <div><b>旬：</b>${escapeHtml(recipe.shun || '')}月</div>
                    </div>

                    <div class="inline-label">菜名</div>
                    <input type="text" id="edit-name-${recipe.id}" value="${escapeAttr(recipe.name)}">

                    <div class="inline-label">食材（用逗号分隔）</div>
                    <input type="text" id="edit-ingredients-${recipe.id}" value="${escapeAttr((recipe.ingredients || []).join(','))}" placeholder="例如：豚肉,玉ねぎ,キャベツ">

                    <div class="inline-label">耗时</div>
                    <div class="tag-group" id="edit-time-${recipe.id}">
                        <span class="tag ${recipe.timeType === '快手菜' ? 'active' : ''}" onclick="selectEditTime(${recipe.id}, '快手菜')">快手菜</span>
                        <span class="tag ${recipe.timeType === '大菜' ? 'active' : ''}" onclick="selectEditTime(${recipe.id}, '大菜')">大菜</span>
                    </div>

                    <div class="inline-label">旬（可手动改）</div>
                    <input type="text" id="edit-shun-${recipe.id}" value="${escapeAttr(recipe.shun || '')}" placeholder="例如：3,4,5">

                    <div class="editor-actions">
                        <button class="secondary-btn" onclick="updateRecipe(${recipe.id})">保存修改</button>
                        <button class="danger-btn" onclick="deleteRecipe(${recipe.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function selectEditTime(id, value) {
            const group = document.getElementById(`edit-time-${id}`);
            group.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            Array.from(group.querySelectorAll('.tag')).find(t => t.innerText === value)?.classList.add('active');
        }

        function updateRecipe(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;

            const name = document.getElementById(`edit-name-${id}`).value.trim();
            const ingredientsRaw = document.getElementById(`edit-ingredients-${id}`).value.trim();
            const shun = document.getElementById(`edit-shun-${id}`).value.trim();
            const activeTimeTag = document.querySelector(`#edit-time-${id} .tag.active`);
            const timeType = activeTimeTag ? activeTimeTag.innerText : '快手菜';

            if (!name) return alert('菜名不能为空');

            const ingredients = ingredientsRaw.split(',').map(s => s.trim()).filter(Boolean);
            recipe.name = name;
            recipe.ingredients = ingredients;
            recipe.timeType = timeType;
            recipe.shun = shun || '1-12';

            saveToStorage();
            renderRecipeList();
            alert(`"${name}" 已更新`);
        }

        function deleteRecipe(id) {
            const target = recipes.find(r => r.id === id);
            if (!target) return;
            if (!confirm(`确定删除「${target.name}」吗？`)) return;
            recipes = recipes.filter(r => r.id !== id);
            saveToStorage();
            renderRecipeList();
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function escapeAttr(str) {
            return escapeHtml(str);
        }
    </script>
</body>
</html>
