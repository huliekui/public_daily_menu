<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>今日料理决策器</title>
    <style>
        :root {
            --main-bg: #fff5f5;
            --accent: #ff6b6b;
            --accent-green: #51cf66;
            --card-bg: white;
            --border: #e9ecef;
            --text: #333;
            --muted: #666;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--main-bg);
            color: var(--text);
            max-width: 780px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 24px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .hero-title {
            text-align: center;
            color: var(--accent);
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 14px 0;
        }

        .category {
            margin: 10px 0;
            font-weight: bold;
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            background: #eee;
            padding: 7px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.25s;
            font-size: 14px;
            user-select: none;
        }

        .tag.active {
            background: var(--accent);
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.92; }
        .green-btn { background: var(--accent-green); }
        .secondary-btn { background: #495057; }
        .danger-btn { background: #e03131; }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        #result {
            background: #fff3bf;
            border-left: 5px solid #fab005;
        }

        details {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            overflow: hidden;
        }

        summary {
            list-style: none;
            cursor: pointer;
            padding: 18px 20px;
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        summary::-webkit-details-marker { display: none; }

        .details-content {
            padding: 0 20px 20px 20px;
        }

        .summary-arrow {
            font-size: 18px;
            transition: transform 0.2s ease;
        }

        details[open] .summary-arrow { transform: rotate(180deg); }

        .recipe-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            background: #fffdfd;
        }

        .recipe-item h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
        }

        .recipe-meta {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .inline-label {
            font-size: 13px;
            color: var(--muted);
            margin: 8px 0 4px;
            font-weight: bold;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .editor-actions button {
            width: auto;
            flex: 1;
            font-size: 14px;
            padding: 10px;
        }

        .empty-state {
            color: var(--muted);
            text-align: center;
            padding: 16px 0;
        }

        .small-text {
            font-size: 14px;
            color: var(--muted);
        }

        .mode-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 10px;
        }

        .mode-btn {
            width: auto;
            min-width: 140px;
            padding: 12px 16px;
            border-radius: 999px;
            background: #f1f3f5;
            color: #333;
            border: 2px solid transparent;
            font-weight: 700;
        }

        .mode-btn.active {
            background: #ffe3e3;
            border-color: var(--accent);
            color: var(--accent);
        }

        .mode-brief {
            text-align: center;
            color: var(--muted);
            margin-bottom: 14px;
            min-height: 20px;
        }

        .custom-panel {
            display: none;
            margin-top: 12px;
            padding: 14px;
            border: 1px dashed #ffc9c9;
            background: #fffafa;
            border-radius: 12px;
        }

        .custom-panel.show { display: block; }

        .result-block {
            line-height: 1.8;
        }

        .result-block ul {
            margin-top: 8px;
            padding-left: 22px;
        }

        .pill {
            display: inline-block;
            background: #fff0f0;
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            margin-right: 6px;
        }

        #afterRollActions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .loadout-panel {
            background: linear-gradient(180deg, #fff9db 0%, #fff3bf 100%);
            border: 1px solid #f4d35e;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .loadout-title {
            font-size: 20px;
            font-weight: 800;
            color: #8f5b00;
            margin-bottom: 10px;
            text-align: center;
        }

        .talent-card {
            background: white;
            border: 1px solid #ffe08a;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
        }

        .talent-name {
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .shopping-list {
            margin-top: 14px;
            background: #fffdf5;
            border: 1px dashed #e0c36c;
            border-radius: 12px;
            padding: 12px;
        }
    </style>
</head>
<body>

    <h1>🍱 每日菜单决策器</h1>

    <div class="card">
        <h2 class="hero-title">🎲 今天吃什么？</h2>
        <p style="text-align:center;">今天是：<span id="todayDate"></span></p>

        <div class="mode-row">
            <button class="mode-btn active" type="button" onclick="selectMode('daily')">日常模式</button>
            <button class="mode-btn" type="button" onclick="selectMode('big')">搞个大菜</button>
            <button class="mode-btn" type="button" onclick="selectMode('custom')">自定义</button>
        </div>

        <div id="modeBrief" class="mode-brief">3个快手菜</div>

        <div class="inline-label">今天想优先使用的食材（可留空，多个用逗号分隔）</div>
        <input type="text" id="mustUseIngredients" placeholder="例如：番茄,鸡蛋,白菜">

        <div id="customPanel" class="custom-panel">
            <div class="inline-label">一共打算做几道菜</div>
            <input type="number" id="customTotal" min="1" max="8" value="3">

            <div class="inline-label">其中做几个大菜</div>
            <input type="number" id="customBig" min="0" max="8" value="1">

            <div class="inline-label">今天特别想吃什么（可留空）</div>
            <input type="text" id="customWish" placeholder="例如：番茄、鲭鱼、咖喱、想吃热乎的">
        </div>

        <div id="actionArea">
            <button id="rollBtn" class="green-btn" onclick="decideMenu()">🌟 开启今日盲盒 🌟</button>

            <div id="afterRollActions" style="display:none;">
                <button class="secondary-btn" onclick="rerollMenu()">🔄 重新随机</button>
                <button onclick="confirmMenu()">✅ 决定是你了！</button>
            </div>
        </div>

        <div id="result" style="display:none; margin-top:15px; padding:15px; border-radius:10px;"></div>
    </div>

    <details>
        <summary>
            <span>📝 录入新菜谱</span>
            <span class="summary-arrow">▼</span>
        </summary>
        <div class="details-content">
            <input type="text" id="recipeName" placeholder="菜名，例如：番茄炒蛋">

            <div class="category">【肉类】</div>
            <div id="meatTags" class="tag-group">
                <span class="tag" onclick="toggleTag(this)">牛肉</span>
                <span class="tag" onclick="toggleTag(this)">猪肉</span>
                <span class="tag" onclick="toggleTag(this)">鸡肉</span>
                <span class="tag" onclick="toggleTag(this)">肉末</span>
            </div>

            <div class="category">【海鲜】</div>
            <div id="seafoodTags" class="tag-group">
                <span class="tag" onclick="toggleTag(this)">虾</span>
                <span class="tag" onclick="toggleTag(this)">鲑鱼</span>
                <span class="tag" onclick="toggleTag(this)">蛤蜊</span>
                <span class="tag" onclick="toggleTag(this)">牡蛎</span>
                <span class="tag" onclick="toggleTag(this)">鲭鱼</span>
                <span class="tag" onclick="toggleTag(this)">鰤鱼</span>
                <span class="tag" onclick="toggleTag(this)">海带</span>
            </div>

            <div class="category">【绿叶蔬菜】</div>
            <div id="leafyVegTags" class="tag-group">
                <span class="tag" onclick="toggleTag(this)">白菜</span>
                <span class="tag" onclick="toggleTag(this)">青梗菜</span>
                <span class="tag" onclick="toggleTag(this)">卷心菜</span>
                <span class="tag" onclick="toggleTag(this)">小松菜</span>
                <span class="tag" onclick="toggleTag(this)">韭菜</span>
                <span class="tag" onclick="toggleTag(this)">蒜苗</span>
                <span class="tag" onclick="toggleTag(this)">菠菜</span>
                <span class="tag" onclick="toggleTag(this)">芹菜</span>
                <span class="tag" onclick="toggleTag(this)">豆芽</span>
            </div>

            <div class="category">【其他蔬菜】</div>
            <div id="otherVegTags" class="tag-group">
                <span class="tag" onclick="toggleTag(this)">洋葱</span>
                <span class="tag" onclick="toggleTag(this)">土豆</span>
                <span class="tag" onclick="toggleTag(this)">青椒</span>
                <span class="tag" onclick="toggleTag(this)">黄瓜</span>
                <span class="tag" onclick="toggleTag(this)">番茄</span>
                <span class="tag" onclick="toggleTag(this)">茄子</span>
                <span class="tag" onclick="toggleTag(this)">蘑菇</span>
                <span class="tag" onclick="toggleTag(this)">南瓜</span>
                <span class="tag" onclick="toggleTag(this)">莲藕</span>
                <span class="tag" onclick="toggleTag(this)">胡萝卜</span>
                <span class="tag" onclick="toggleTag(this)">笋</span>
            </div>

            <div class="category">【其他】</div>
            <div id="otherTags" class="tag-group">
                <span class="tag" onclick="toggleTag(this)">鸡蛋</span>
                <span class="tag" onclick="toggleTag(this)">豆腐</span>
                <span class="tag" onclick="toggleTag(this)">粉丝</span>
            </div>

            <div class="category">【耗时】</div>
            <div id="timeTags" class="tag-group">
                <span class="tag active" onclick="selectOne(this)">快手菜</span>
                <span class="tag" onclick="selectOne(this)">大菜</span>
            </div>

            <button onclick="saveRecipe()">保存并让 AI 分析录入 ✨</button>
        </div>
    </details>

    <details>
        <summary>
            <span>📚 查看编辑现有菜谱</span>
            <span class="summary-arrow">▼</span>
        </summary>
        <div class="details-content">
            <button type="button" class="secondary-btn" style="margin-bottom:12px;" onclick="exportRecipesJson()">
                📦 导出当前菜谱 JSON
            </button>
            <div id="recipeList"></div>
        </div>
    </details>

    <script>
        const API_KEY = "sk-998f5cd052f243f7a609f808b2e3173e";
        const STORAGE_KEY = 'my_recipes';
        const MENU_HISTORY_KEY = 'menu_history_v1';

        const PROTEIN_INGREDIENTS = ['牛肉','猪肉','鸡肉','肉末','虾','鲑鱼','蛤蜊','牡蛎','鲭鱼','鰤鱼','鸡蛋','豆腐'];
        const VEGETABLE_INGREDIENTS = ['白菜','青梗菜','卷心菜','小松菜','韭菜','蒜苗','菠菜','芹菜','豆芽','洋葱','土豆','青椒','黄瓜','番茄','茄子','蘑菇','南瓜','莲藕','胡萝卜','笋'];

        let recipes = [];
        let selectedMode = 'daily';
        let latestSuggestedMenu = null;
        let latestMenuConfig = null;

        document.getElementById('todayDate').innerText = new Date().toLocaleDateString();
        initRecipes();

        async function initRecipes() {
            const localRecipes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            let jsonRecipes = [];

            try {
                const response = await fetch('./my_recipes.json', { cache: 'no-store' });
                if (response.ok) {
                    const data = await response.json();
                    if (Array.isArray(data)) {
                        jsonRecipes = data;
                    }
                }
            } catch (e) {
                // 如果读取 json 失败，就只用 localStorage
            }

            recipes = mergeRecipes(jsonRecipes, localRecipes);
            saveToStorage();
            renderRecipeList();
        }

        function mergeRecipes(jsonRecipes, localRecipes) {
            const mergedMap = new Map();

            [...jsonRecipes, ...localRecipes].forEach((recipe, index) => {
                if (!recipe || !recipe.name) return;

                const normalizedName = String(recipe.name).trim().toLowerCase();
                const normalizedIngredients = Array.isArray(recipe.ingredients)
                    ? [...recipe.ingredients].map(x => String(x).trim()).sort().join('|')
                    : '';

                const key = `${normalizedName}__${normalizedIngredients}`;

                if (!mergedMap.has(key)) {
                    mergedMap.set(key, {
                        id: recipe.id || Date.now() + index,
                        name: recipe.name || '',
                        ingredients: Array.isArray(recipe.ingredients) ? recipe.ingredients : [],
                        timeType: recipe.timeType || '快手菜',
                        shun: recipe.shun || '1-12',
                        date: recipe.date || new Date().toISOString()
                    });
                } else {
                    const existing = mergedMap.get(key);
                    mergedMap.set(key, {
                        ...existing,
                        ...recipe,
                        id: existing.id || recipe.id || Date.now() + index,
                        name: existing.name || recipe.name || '',
                        ingredients: (existing.ingredients && existing.ingredients.length)
                            ? existing.ingredients
                            : (Array.isArray(recipe.ingredients) ? recipe.ingredients : []),
                        timeType: existing.timeType || recipe.timeType || '快手菜',
                        shun: existing.shun && existing.shun !== '1-12'
                            ? existing.shun
                            : (recipe.shun || '1-12'),
                        date: existing.date || recipe.date || new Date().toISOString()
                    });
                }
            });

            return Array.from(mergedMap.values());
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
        }

        function getMenuHistory() {
            const raw = JSON.parse(localStorage.getItem(MENU_HISTORY_KEY) || '[]');
            const today = new Date();

            const filtered = raw.filter(item => {
                const diff = Math.floor((today - new Date(item.date)) / (1000 * 60 * 60 * 24));
                return diff <= 10;
            });

            localStorage.setItem(MENU_HISTORY_KEY, JSON.stringify(filtered));
            return filtered;
        }

        function saveMenuHistory(history) {
            localStorage.setItem(MENU_HISTORY_KEY, JSON.stringify(history));
        }

        function getDateString(date = new Date()) {
            return date.toISOString().slice(0, 10);
        }

        function getRecentDishStats() {
            const history = getMenuHistory();
            const todayStr = getDateString();
            const stats = {};

            history.forEach(record => {
                const diff = Math.floor((new Date(todayStr) - new Date(record.date)) / (1000 * 60 * 60 * 24));
                (record.dishes || []).forEach(name => {
                    if (!stats[name]) stats[name] = { lastDaysAgo: 999, count: 0 };
                    stats[name].count += 1;
                    stats[name].lastDaysAgo = Math.min(stats[name].lastDaysAgo, diff);
                });
            });

            return stats;
        }

        function saveConfirmedMenu(menuObj) {
            const history = getMenuHistory();
            const todayStr = getDateString();

            const newRecord = {
                date: todayStr,
                dishes: (menuObj.dishes || []).map(d => d.name),
                ingredients: collectIngredientsFromMenu(menuObj.dishes || []),
                fullMenu: menuObj
            };

            const withoutToday = history.filter(item => item.date !== todayStr);
            withoutToday.push(newRecord);
            saveMenuHistory(withoutToday);
        }

        function collectIngredientsFromMenu(dishes) {
            const map = {};
            dishes.forEach(d => {
                (d.ingredients || []).forEach(ing => {
                    map[ing] = (map[ing] || 0) + 1;
                });
            });
            return map;
        }

        function toggleTag(el) {
            el.classList.toggle('active');
        }

        function selectOne(el) {
            el.parentElement.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function selectMode(mode) {
            selectedMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            const buttons = document.querySelectorAll('.mode-btn');
            if (mode === 'daily') buttons[0].classList.add('active');
            if (mode === 'big') buttons[1].classList.add('active');
            if (mode === 'custom') buttons[2].classList.add('active');

            const brief = document.getElementById('modeBrief');
            const panel = document.getElementById('customPanel');

            if (mode === 'daily') {
                brief.innerText = '3个快手菜';
                panel.classList.remove('show');
            } else if (mode === 'big') {
                brief.innerText = '2个快手菜 + 1个大菜';
                panel.classList.remove('show');
            } else {
                brief.innerText = '自己决定总菜数、大菜数和想吃的内容';
                panel.classList.add('show');
            }
        }

        async function saveRecipe() {
            const name = document.getElementById('recipeName').value.trim();
            if (!name) return alert('写个菜名嘛~');

            const selectedTags = Array.from(
                document.querySelectorAll(
                    '#meatTags .tag.active, #seafoodTags .tag.active, #leafyVegTags .tag.active, #otherVegTags .tag.active, #otherTags .tag.active, #timeTags .tag.active'
                )
            ).map(t => t.innerText);

            const timeType = selectedTags.find(t => t === '快手菜' || t === '大菜') || '快手菜';
            const ingredients = selectedTags.filter(t => t !== '快手菜' && t !== '大菜');

            if (ingredients.length === 0) return alert('至少选一些食材吧~');

            alert('正在召唤 DeepSeek 分析录入...');
            const shun = await getShunFromAI(ingredients);

            const newRecipe = {
                id: Date.now(),
                name,
                ingredients,
                timeType,
                shun,
                date: new Date().toISOString()
            };

            recipes.push(newRecipe);
            saveToStorage();
            renderRecipeList();

            alert(`成功！"${name}" 已存入本地缓存。旬：${shun}月`);
            document.getElementById('recipeName').value = '';
            document.querySelectorAll('#meatTags .tag.active, #seafoodTags .tag.active, #leafyVegTags .tag.active, #otherVegTags .tag.active, #otherTags .tag.active')
                .forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#timeTags .tag').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#timeTags .tag')[0].classList.add('active');
        }

        async function getShunFromAI(ing) {
            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [{
                            role: 'user',
                            content: `分析食材 ${ing.join(',')}。只输出它们在日本最适合食用的数字月份（如3,4,5），不要解释。`
                        }]
                    })
                });
                const data = await response.json();
                return data?.choices?.[0]?.message?.content?.trim() || '1-12';
            } catch (e) {
                return '1-12';
            }
        }

        function getModeConfig() {
            if (selectedMode === 'daily') {
                return { total: 3, bigCount: 0, wish: '' };
            }
            if (selectedMode === 'big') {
                return { total: 3, bigCount: 1, wish: '' };
            }

            const total = Number(document.getElementById('customTotal').value || 0);
            const bigCount = Number(document.getElementById('customBig').value || 0);
            const wish = document.getElementById('customWish').value.trim();
            return { total, bigCount, wish };
        }

        function rerollMenu() {
            if (!latestMenuConfig) {
                alert('还没有可重随机的菜单哦');
                return;
            }
            decideMenu(true);
        }

        function confirmMenu() {
            if (!latestSuggestedMenu) {
                alert('还没有菜单可以确认哦');
                return;
            }

            saveConfirmedMenu(latestSuggestedMenu);
            renderConfirmedMenu(latestSuggestedMenu, latestMenuConfig);

            document.getElementById('afterRollActions').style.display = 'none';
        }

        async function decideMenu(isReroll = false) {
            if (recipes.length < 2) return alert('库里菜太少了，多存几道吧！QAQ');

            const { total, bigCount, wish } = getModeConfig();
            const mustUseText = document.getElementById('mustUseIngredients').value.trim();
            const mustUseIngredients = mustUseText
                ? mustUseText.split(/[\s,，、]+/).map(s => s.trim()).filter(Boolean)
                : [];

            if (!Number.isInteger(total) || total <= 0) return alert('总菜数要填正确');
            if (!Number.isInteger(bigCount) || bigCount < 0) return alert('大菜数要填正确');
            if (bigCount > total) return alert('大菜数不能大于总菜数');
            if (recipes.length < total) return alert(`当前只有 ${recipes.length} 道菜，暂时凑不出 ${total} 道哦`);

            const currentDate = new Date();
            const currentMonth = currentDate.getMonth() + 1;
            const weekday = ['周日','周一','周二','周三','周四','周五','周六'][currentDate.getDay()];
            const quickRecipes = recipes.filter(r => r.timeType === '快手菜');
            const bigRecipes = recipes.filter(r => r.timeType === '大菜');

            if (bigCount > bigRecipes.length) return alert(`大菜库存不够，目前只有 ${bigRecipes.length} 道大菜`);
            if ((total - bigCount) > quickRecipes.length) return alert(`快手菜库存不够，目前只有 ${quickRecipes.length} 道快手菜`);

            const recentStats = getRecentDishStats();

            const candidatePool = recipes.map(r => {
                const stat = recentStats[r.name] || { lastDaysAgo: 999, count: 0 };
                return {
                    name: r.name,
                    ingredients: r.ingredients || [],
                    timeType: r.timeType || '快手菜',
                    shun: r.shun || '',
                    isInSeason: isMonthInShun(currentMonth, r.shun || ''),
                    avoidToday: stat.lastDaysAgo === 0,
                    stronglyAvoid: stat.lastDaysAgo === 1,
                    lowerWeight: stat.lastDaysAgo === 2,
                    matchedMustUse: mustUseIngredients.some(ing => (r.ingredients || []).includes(ing))
                };
            });

            const resDiv = document.getElementById('result');
            resDiv.style.display = 'block';
            resDiv.innerHTML = 'DeepSeek 正在给你配今日菜单...';

            const fallbackMenu = buildFallbackMenu(total, bigCount, wish, currentMonth, weekday, mustUseIngredients, candidatePool);

            try {
                const aiResult = await getMenuFromAI({
                    currentMonth,
                    weekday,
                    total,
                    bigCount,
                    wish,
                    mustUseIngredients,
                    candidatePool,
                    fallbackMenu
                });

                latestSuggestedMenu = aiResult;
                latestMenuConfig = { total, bigCount, wish, currentMonth, weekday, mustUseIngredients };

                renderMenuResult(aiResult, latestMenuConfig);

                document.getElementById('afterRollActions').style.display = 'flex';
                document.getElementById('rollBtn').style.display = 'none';
            } catch (e) {
                latestSuggestedMenu = fallbackMenu;
                latestMenuConfig = { total, bigCount, wish, currentMonth, weekday, mustUseIngredients };

                renderFallbackResult(fallbackMenu, latestMenuConfig);

                document.getElementById('afterRollActions').style.display = 'flex';
                document.getElementById('rollBtn').style.display = 'none';
            }
        }

        function buildFallbackMenu(total, bigCount, wish, currentMonth, weekday, mustUseIngredients, candidatePool) {
            const scored = [...recipes].map(r => {
                const candidate = candidatePool.find(c => c.name === r.name) || {};
                let score = 0;

                if (candidate.isInSeason) score += 40;
                if (wish && matchesWish(r, wish)) score += 25;
                if (mustUseIngredients.some(ing => (r.ingredients || []).includes(ing))) score += 35;

                if (candidate.stronglyAvoid) score -= 999;
                else if (candidate.lowerWeight) score -= 20;

                score += Math.random() * 20;

                return { ...r, score };
            }).sort((a, b) => b.score - a.score);

            const selected = [];
            const selectedNames = new Set();

            if (mustUseIngredients.length > 0) {
                const mustMatch = scored.find(r =>
                    mustUseIngredients.some(ing => (r.ingredients || []).includes(ing))
                );
                if (mustMatch) {
                    selected.push(mustMatch);
                    selectedNames.add(mustMatch.name);
                }
            }

            const needBig = Math.max(0, bigCount - selected.filter(x => x.timeType === '大菜').length);
            const bigs = scored
                .filter(r => r.timeType === '大菜' && !selectedNames.has(r.name))
                .slice(0, needBig);

            bigs.forEach(x => {
                selected.push(x);
                selectedNames.add(x.name);
            });

            const remainQuickCount = total - selected.length;
            const quicks = scored
                .filter(r => r.timeType === '快手菜' && !selectedNames.has(r.name))
                .slice(0, remainQuickCount);

            quicks.forEach(x => {
                selected.push(x);
                selectedNames.add(x.name);
            });

            const finalMenu = selected.slice(0, total);

            return {
                dishes: finalMenu.map(r => ({
                    name: r.name,
                    timeType: r.timeType,
                    ingredients: r.ingredients,
                    reason: ''
                })),
                comment: generateDynamicFallbackComment(
                    finalMenu.map(r => ({
                        name: r.name,
                        timeType: r.timeType,
                        ingredients: r.ingredients
                    })),
                    { total, bigCount, wish, currentMonth, weekday, mustUseIngredients }
                )
            };
        }

        async function getMenuFromAI(payload) {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        {
                            role: 'system',
                            content: '你是一个会配家庭菜单的中文料理助手。你必须严格从用户给出的候选菜谱中选菜，不能编造不存在的菜名。优先旬食材，注意荤素搭配、营养均衡、做菜负担。尽量避免同类型菜超过两道，汤类最多一道（如果无法判断请尽量根据菜名推断）。如果用户指定了想优先使用的食材，最终菜单必须至少包含一道使用该食材的菜。昨天确认过的菜不要选，前天的菜尽量降权。输出必须是合法JSON对象，不要markdown，不要代码块，不要解释。每道菜的reason要自然解释为什么这样搭配，不要使用固定模板。comment字段必须根据整套菜单写一句风趣幽默的中文短评，说明为什么这样搭配。'
                        },
                        {
                            role: 'user',
                            content: JSON.stringify({
                                task: '从候选菜谱中选出今日菜单',
                                requiredJsonShape: {
                                    dishes: [
                                        {
                                            name: '菜名',
                                            timeType: '快手菜或大菜',
                                            ingredients: ['食材1','食材2'],
                                            reason: '自然说明这道菜为什么入选，不要模板化'
                                        }
                                    ],
                                    comment: '一句根据整套菜单写的风趣中文短评'
                                },
                                rules: {
                                    mustSelectExactly: payload.total,
                                    bigDishCount: payload.bigCount,
                                    preferInSeason: true,
                                    preferBalancedNutrition: true,
                                    avoidTooManySameCookingStyles: true,
                                    maxSoupDish: 1,
                                    considerWish: payload.wish || '',
                                    mustUseIngredients: payload.mustUseIngredients || [],
                                    outputLanguage: 'zh-CN'
                                },
                                dateInfo: {
                                    month: payload.currentMonth,
                                    weekday: payload.weekday
                                },
                                candidates: payload.candidatePool,
                                fallbackReference: payload.fallbackMenu
                            })
                        }
                    ],
                    temperature: 1.0
                })
            });

            const data = await response.json();
            const raw = data?.choices?.[0]?.message?.content?.trim();
            const parsed = safeParseJSON(raw);
            if (!parsed || !Array.isArray(parsed.dishes)) throw new Error('AI返回格式异常');
            return parsed;
        }

        function renderMenuResult(aiResult, config) {
            const resDiv = document.getElementById('result');
            const dishes = aiResult.dishes || [];
            const comment = aiResult.comment || '今天这顿饭，主打一个吃完还能夸自己会过日子。';

            let html = `<div class="result-block">`;
            html += `<div><span class="pill">${config.currentMonth}月优先</span><span class="pill">${config.bigCount}个大菜</span><span class="pill">共${config.total}道</span></div>`;
            html += `<h4>🎉 今日菜单</h4><ul>`;

            dishes.forEach(d => {
                const ing = Array.isArray(d.ingredients) ? d.ingredients.join('、') : '';
                html += `<li><b>${escapeHtml(d.name || '')}</b>（${escapeHtml(d.timeType || '')}）`;
                if (ing) html += ` - 食材：${escapeHtml(ing)}`;
                if (d.reason) html += `<br><span class="small-text">→ ${escapeHtml(d.reason)}</span>`;
                html += `</li>`;
            });

            html += `</ul>`;

            if (config.wish) {
                html += `<p><b>你今天想吃：</b>${escapeHtml(config.wish)}</p>`;
            }
            if (config.mustUseIngredients && config.mustUseIngredients.length) {
                html += `<p><b>优先使用食材：</b>${escapeHtml(config.mustUseIngredients.join('、'))}</p>`;
            }

            html += `<p><b>锐评：</b>${escapeHtml(comment)}</p>`;
            html += `</div>`;
            resDiv.innerHTML = html;
        }

        function renderFallbackResult(fallbackMenu, config) {
            renderMenuResult(fallbackMenu, config);
        }

        function renderConfirmedMenu(menuObj, config) {
            const resDiv = document.getElementById('result');
            const dishes = menuObj.dishes || [];
            const ingredientMap = collectIngredientsFromMenu(dishes);

            let html = `<div class="loadout-panel">`;
            html += `<div class="loadout-title">🎖 今晚菜单已锁定</div>`;

            dishes.forEach((d, idx) => {
                html += `
                    <div class="talent-card">
                        <div class="talent-name">[${idx + 1}] ${escapeHtml(d.name || '')} · ${escapeHtml(d.timeType || '')}</div>
                        <div class="small-text">${escapeHtml((d.ingredients || []).join('、'))}</div>
                        ${d.reason ? `<div style="margin-top:6px;">${escapeHtml(d.reason)}</div>` : ''}
                    </div>
                `;
            });

            html += `<div class="shopping-list"><b>🛒 所需食材</b><ul>`;
            Object.entries(ingredientMap).forEach(([name, count]) => {
                html += `<li>${escapeHtml(name)} × ${count}</li>`;
            });
            html += `</ul></div>`;

            if (config?.mustUseIngredients && config.mustUseIngredients.length) {
                html += `<p style="margin-top:10px;"><b>优先使用食材：</b>${escapeHtml(config.mustUseIngredients.join('、'))}</p>`;
            }

            if (menuObj.comment) {
                html += `<p style="margin-top:12px;"><b>锐评：</b>${escapeHtml(menuObj.comment)}</p>`;
            }

            html += `</div>`;
            resDiv.innerHTML = html;
        }

        function isMonthInShun(month, shunText) {
            if (!shunText) return false;
            const nums = (String(shunText).match(/\d+/g) || []).map(Number);
            return nums.includes(month);
        }

        function matchesWish(recipe, wish) {
            const text = `${recipe.name} ${(recipe.ingredients || []).join(' ')}`.toLowerCase();
            return String(wish).toLowerCase().split(/[\s,，、]+/).filter(Boolean).some(word => text.includes(word));
        }

        function isVegetable(name) {
            return VEGETABLE_INGREDIENTS.includes(name);
        }

        function isProtein(name) {
            return PROTEIN_INGREDIENTS.includes(name);
        }

        function generateDynamicFallbackComment(dishes, config) {
            const names = dishes.map(d => d.name).filter(Boolean);
            const hasBig = dishes.some(d => d.timeType === '大菜');
            const mustUseText = (config.mustUseIngredients || []).join('、');

            const pool = [
                `这套菜单走的是${hasBig ? '“有主菜镇场子”' : '“轻快高效”'}路线，吃得不敷衍，做起来也不至于把人做破防。`,
                `${names.slice(0, 2).join('、')}${names[2] ? '再配上' + names[2] : ''}，这已经不是随便吃一口了，这是今晚厨房局的正式阵容。`,
                `${mustUseText ? `还顺手把你想用的 ${mustUseText} 塞进去了，` : ''}这份搭配的核心思想就是：冰箱要尊重，胃口也要尊重。`,
                `这套组合看起来像是深思熟虑，其实本质上是在“别太累”和“别太随便”之间找到了和平。`
            ];

            return pool[Math.floor(Math.random() * pool.length)];
        }

        function safeParseJSON(text) {
            if (!text) return null;
            try { return JSON.parse(text); } catch (e) {}
            const match = text.match(/\{[\s\S]*\}/);
            if (!match) return null;
            try { return JSON.parse(match[0]); } catch (e) { return null; }
        }

        function renderRecipeList() {
            const recipeList = document.getElementById('recipeList');
            if (!recipes.length) {
                recipeList.innerHTML = `<div class="empty-state">目前还没有菜谱，先去录入几道吧。</div>`;
                return;
            }

            recipeList.innerHTML = recipes.map(recipe => `
                <div class="recipe-item">
                    <h4>${escapeHtml(recipe.name)}</h4>
                    <div class="recipe-meta">
                        <div><b>食材：</b>${escapeHtml((recipe.ingredients || []).join('、'))}</div>
                        <div><b>耗时：</b>${escapeHtml(recipe.timeType || '')}</div>
                        <div><b>旬：</b>${escapeHtml(recipe.shun || '')}月</div>
                    </div>

                    <div class="inline-label">菜名</div>
                    <input type="text" id="edit-name-${recipe.id}" value="${escapeAttr(recipe.name)}">

                    <div class="inline-label">食材（用逗号分隔）</div>
                    <input type="text" id="edit-ingredients-${recipe.id}" value="${escapeAttr((recipe.ingredients || []).join(','))}" placeholder="例如：猪肉,洋葱,番茄">

                    <div class="inline-label">耗时</div>
                    <div class="tag-group" id="edit-time-${recipe.id}">
                        <span class="tag ${recipe.timeType === '快手菜' ? 'active' : ''}" onclick="selectEditTime(${recipe.id}, '快手菜')">快手菜</span>
                        <span class="tag ${recipe.timeType === '大菜' ? 'active' : ''}" onclick="selectEditTime(${recipe.id}, '大菜')">大菜</span>
                    </div>

                    <div class="inline-label">旬（可手动改）</div>
                    <input type="text" id="edit-shun-${recipe.id}" value="${escapeAttr(recipe.shun || '')}" placeholder="例如：3,4,5">

                    <div class="editor-actions">
                        <button class="secondary-btn" onclick="updateRecipe(${recipe.id})">保存修改</button>
                        <button class="danger-btn" onclick="deleteRecipe(${recipe.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function selectEditTime(id, value) {
            const group = document.getElementById(`edit-time-${id}`);
            group.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            Array.from(group.querySelectorAll('.tag')).find(t => t.innerText === value)?.classList.add('active');
        }

        function updateRecipe(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;

            const name = document.getElementById(`edit-name-${id}`).value.trim();
            const ingredientsRaw = document.getElementById(`edit-ingredients-${id}`).value.trim();
            const shun = document.getElementById(`edit-shun-${id}`).value.trim();
            const activeTimeTag = document.querySelector(`#edit-time-${id} .tag.active`);
            const timeType = activeTimeTag ? activeTimeTag.innerText : '快手菜';

            if (!name) return alert('菜名不能为空');

            const ingredients = ingredientsRaw.split(',').map(s => s.trim()).filter(Boolean);
            recipe.name = name;
            recipe.ingredients = ingredients;
            recipe.timeType = timeType;
            recipe.shun = shun || '1-12';

            saveToStorage();
            renderRecipeList();
            alert(`"${name}" 已更新`);
        }

        function deleteRecipe(id) {
            const target = recipes.find(r => r.id === id);
            if (!target) return;
            if (!confirm(`确定删除「${target.name}」吗？`)) return;
            recipes = recipes.filter(r => r.id !== id);
            saveToStorage();
            renderRecipeList();
        }

        function exportRecipesJson() {
            try {
                const exportData = recipes.map(r => ({
                    id: r.id,
                    name: r.name || '',
                    ingredients: Array.isArray(r.ingredients) ? r.ingredients : [],
                    timeType: r.timeType || '快手菜',
                    shun: r.shun || '1-12',
                    date: r.date || ''
                }));

                const blob = new Blob(
                    [JSON.stringify(exportData, null, 2)],
                    { type: 'application/json;charset=utf-8' }
                );

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const today = getDateString();

                a.href = url;
                a.download = `my_recipes_backup_${today}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('导出失败，请稍后再试');
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function escapeAttr(str) {
            return escapeHtml(str);
        }
    </script>
</body>
</html>
